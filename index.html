<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKO N-Dhonk POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --primary: #38bdf8; --text: #f1f5f9; --muted: #94a3b8;
            --success: #34d399; --danger: #f87171; --warning: #fbbf24;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
        
        .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
        
        .topbar { background:var(--card); padding:8px 12px; display:flex; justify-content:space-between; align-items:center; font-size:11px; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); }
        .dot { width:7px; height:7px; border-radius:50%; background:var(--success); display:inline-block; margin-right:5px; }
        .dot.off { background:var(--danger); }
        .session { padding:4px 10px; border-radius:15px; font-weight:700; font-size:10px; }
        .session.pagi { background:#fbbf24; color:#000; }
        .session.malam { background:#6366f1; color:#fff; }
        
        .header { padding:12px; display:flex; align-items:center; gap:10px; }
        .logo { width:40px; height:40px; background:linear-gradient(135deg,#0ea5e9,#8b5cf6); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
        .header h1 { font-size:16px; font-weight:800; }
        .header p { font-size:9px; color:var(--muted); }
        .hbtn { width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-left:4px; }
        
        .tabs { padding:6px 10px; display:flex; gap:5px; overflow-x:auto; }
        .tab { padding:7px 12px; border-radius:18px; border:1px solid var(--border); background:transparent; color:var(--muted); font-weight:600; font-size:11px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
        .tab.active { background:linear-gradient(135deg,#0ea5e9,#8b5cf6); color:#fff; border-color:transparent; }
        
        .main-content { flex:1; overflow-y:auto; padding-bottom:160px; }
        
        .cat-title { font-size:11px; font-weight:700; margin:8px 10px 4px; padding:5px 8px; border-radius:6px; display:flex; align-items:center; gap:4px; }
        .cat-nk { background:rgba(245,158,11,0.15); color:#f59e0b; }
        .cat-lauk { background:rgba(239,68,68,0.15); color:#ef4444; }
        .cat-sembako { background:rgba(139,92,246,0.15); color:#8b5cf6; }
        
        .product-list { padding:0 10px; display:flex; flex-wrap:wrap; gap:6px; }
        .product-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; cursor:pointer; font-weight:600; font-size:12px; min-width:calc(50% - 3px); flex:1; }
        .product-card:active { border-color:var(--primary); }
        .product-card .pcat { font-size:9px; color:var(--muted); }
        .product-card .pname { margin:2px 0; }
        .product-card .pprice { color:var(--primary); font-size:13px; }
        
        .cart { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--card); border-radius:16px 16px 0 0; padding:12px; box-shadow:0 -4px 20px rgba(0,0,0,0.5); z-index:200; }
        .cart-items { max-height:120px; overflow-y:auto; margin-bottom:8px; }
        .cart-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(51,65,85,0.5); font-size:12px; }
        .cart-item .qty-control { display:flex; align-items:center; gap:6px; }
        .qty-btn { width:24px; height:24px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .qty-btn:active { background:var(--primary); }
        .cart-item .item-total { font-weight:700; min-width:70px; text-align:right; }
        .cart-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; }
        .cart-total { font-weight:800; font-size:20px; color:var(--primary); }
        .cart-actions { display:flex; gap:6px; }
        .btn { padding:11px; border-radius:10px; border:none; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; }
        .btn:active { transform:scale(0.97); }
        .btn-pay { flex:1; background:linear-gradient(135deg,#0ea5e9,#8b5cf6); color:#fff; font-size:14px; }
        .btn-pay:disabled { opacity:0.4; pointer-events:none; }
        .btn-clr { background:transparent; border:1px solid var(--border); color:var(--danger); min-width:40px; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; padding:12px; }
        .modal.show { display:flex; }
        .modal-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; width:100%; max-width:400px; max-height:80vh; overflow-y:auto; }
        .modal-box h3 { font-size:15px; margin-bottom:12px; }
        .modal-close { float:right; background:none; border:none; color:var(--text); font-size:18px; cursor:pointer; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; }
        .form-group input, .form-group select { width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; font-family:inherit; }
        
        .pay-opts { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:10px 0; }
        .pay-opt { padding:14px; border:2px solid var(--border); border-radius:10px; text-align:center; cursor:pointer; font-weight:600; font-size:12px; }
        .pay-opt.active { border-color:var(--primary); background:rgba(56,189,248,0.1); }
        
        .money-suggestions { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; }
        .money-chip { padding:6px 10px; border-radius:14px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:11px; font-weight:600; cursor:pointer; }
        .money-chip:active { background:var(--primary); color:#fff; }
        
        .change-display { background:var(--bg); padding:10px; border-radius:8px; margin:8px 0; text-align:center; }
        
        .report-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:8px; font-size:12px; }
        .report-row { display:flex; justify-content:space-between; padding:3px 0; font-size:11px; color:var(--muted); }
        .report-total { font-weight:700; margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
        
        .detail-item { background:var(--card); border-radius:8px; padding:8px; margin-bottom:6px; font-size:11px; }
        .detail-header { display:flex; justify-content:space-between; font-weight:700; margin-bottom:4px; }
        
        .toast { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:var(--card); border-left:3px solid var(--success); padding:10px 14px; border-radius:8px; z-index:3000; font-size:11px; animation:slideIn 0.3s ease; }
        .toast.err { border-color:var(--danger); }
        @keyframes slideIn { from{opacity:0;transform:translateX(-50%) translateY(-20px);} }
        
        .loading { display:none; position:fixed; inset:0; background:rgba(15,23,42,0.9); z-index:4000; justify-content:center; align-items:center; }
        .loading.show { display:flex; }
        .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div><span class="dot" id="dot"></span> <span id="statusText">...</span></div>
            <div style="font-weight:700;" id="clock">--:--</div>
            <div class="session pagi" id="sessionBadge">🌅 PAGI</div>
        </div>
        
        <div class="header">
            <div class="logo">🏪</div>
            <div><h1>TOKO N-Dhonk</h1><p>Nasi Kuning · Lauk · Sembako</p></div>
            <div style="margin-left:auto;display:flex;">
                <button class="hbtn" onclick="openModal('reportModal')">📊</button>
                <button class="hbtn" onclick="openModal('productModal')">📦</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="filterCat('Semua',this)">Semua</button>
            <button class="tab" onclick="filterCat('Nasi Kuning',this)">Nasi Kuning</button>
            <button class="tab" onclick="filterCat('Lauk',this)">Lauk</button>
            <button class="tab" onclick="filterCat('Sembako',this)">Sembako</button>
        </div>
        
        <div class="main-content" id="productArea"></div>
        
        <div class="cart">
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-row"><span>Total</span><span class="cart-total" id="cartTotal">Rp 0</span></div>
            <div class="cart-actions">
                <button class="btn btn-clr" onclick="clearCart()">🗑️</button>
                <button class="btn btn-pay" id="btnPay" onclick="openPayment()" disabled>💳 Bayar</button>
            </div>
        </div>
    </div>
    
    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('paymentModal')">✕</button>
            <h3>💳 Pembayaran</h3>
            <div class="pay-opts">
                <div class="pay-opt active" onclick="setPayment('Tunai',this)">💵 Tunai</div>
                <div class="pay-opt" onclick="setPayment('QRIS',this)">📱 QRIS</div>
            </div>
            <div id="tunaiSection">
                <div class="cart-row"><span>Total</span><span class="cart-total" id="payAmount">Rp 0</span></div>
                <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;">Rekomendasi:</div>
                <div class="money-suggestions" id="moneySuggestions"></div>
                <div class="form-group"><label>Uang Diterima</label><input type="number" id="cashReceived" placeholder="Jumlah uang" oninput="calculateChange()"></div>
                <div class="change-display" id="changeDisplay" style="display:none;"></div>
            </div>
            <div id="qrisSection" style="display:none;text-align:center;padding:16px;">
                <div style="font-size:40px;">📱</div>
                <div class="cart-total" id="qrisAmount">Rp 0</div>
                <p style="color:var(--muted);font-size:11px;">Scan QRIS</p>
            </div>
            <button class="btn btn-pay" onclick="processPayment()" style="width:100%;margin-top:10px;">✅ Konfirmasi</button>
        </div>
    </div>
    
    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('productModal')">✕</button>
            <h3>➕ Tambah Produk</h3>
            <div class="form-group"><label>Nama</label><input type="text" id="pName" placeholder="Nama produk"></div>
            <div class="form-group"><label>Kategori</label><select id="pCat"><option value="Nasi Kuning">Nasi Kuning</option><option value="Lauk">Lauk</option><option value="Sembako">Sembako</option></select></div>
            <div class="form-group"><label>Harga (Rp)</label><input type="number" id="pPrice" placeholder="Harga"></div>
            <button class="btn btn-pay" onclick="addProduct()" style="width:100%;">Simpan</button>
            
            <hr style="border-color:var(--border);margin:12px 0;">
            <h3>💰 Update Harga</h3>
            <div class="form-group"><label>Produk</label><select id="updateSelect"></select></div>
            <div class="form-group"><label>Harga Baru</label><input type="number" id="updatePrice" placeholder="Harga baru"></div>
            <button class="btn" style="background:#f97316;color:#fff;width:100%;" onclick="updateProductPrice()">Update</button>
            
            <hr style="border-color:var(--border);margin:12px 0;">
            <h3>🗑️ Nonaktifkan</h3>
            <div class="form-group"><label>Produk</label><select id="deleteSelect"></select></div>
            <button class="btn" style="background:var(--danger);color:#fff;width:100%;" onclick="deleteProduct()">Nonaktifkan</button>
        </div>
    </div>
    
    <!-- Report Modal -->
    <div class="modal" id="reportModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('reportModal')">✕</button>
            <h3>📊 Laporan</h3>
            <div class="form-group"><label>Jenis</label><select id="reportType" onchange="switchReport()"><option value="daily">Harian</option><option value="monthly">Bulanan</option></select></div>
            <div id="dailyDate"><div class="form-group"><label>Tanggal</label><input type="date" id="rDate" onchange="loadReport()"></div></div>
            <div id="monthlyDate" style="display:none;"><div class="form-group"><label>Bulan</label><input type="month" id="rMonth" onchange="loadReport()"></div></div>
            <div id="reportContent"></div>
        </div>
    </div>
    
    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
            <h3>📋 Rincian Transaksi</h3>
            <div id="detailContent"></div>
        </div>
    </div>
    
    <div id="toastContainer" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:3000;width:90%;max-width:400px;"></div>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <script>
        // ⚠️ GANTI DENGAN URL DEPLOYMENT ANDA
        const API = 'https://script.google.com/macros/s/AKfycby0mpLoFPYZe5Yp_YMkrJAXSOhHPM1X-WA5Hgq5ciPCl1osy9WUs_LKu3k0mqt6EsLG/exec';
        
        const PECAHAN = [100000, 50000, 20000, 10000, 5000, 2000, 1000, 500];
        let products = [], cart = [], filter = 'Semua', payment = 'Tunai';
        
        document.addEventListener('DOMContentLoaded', () => {
            setDates();
            updateClock();
            setInterval(updateClock, 30000);
            checkConnection();
            loadProducts();
        });
        
        function setDates() {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('rDate').value = now;
            document.getElementById('rMonth').value = now.slice(0,7);
        }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours() + ':' + now.getMinutes().toString().padStart(2,'0');
            const badge = document.getElementById('sessionBadge');
            const h = now.getHours();
            if (h >= 6 && h < 17) { badge.textContent = '🌅 PAGI'; badge.className = 'session pagi'; }
            else { badge.textContent = '🌙 MALAM'; badge.className = 'session malam'; }
        }
        
        function formatRupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
        
        async function fetchAPI(action, data = null, params = '') {
            try {
                let url = API + '?action=' + action + params;
                let opts = { method: 'GET' };
                if (data) { opts.method = 'POST'; opts.body = JSON.stringify(data); }
                const res = await fetch(url, opts);
                return await res.json();
            } catch(e) { console.error(e); return { error: true }; }
        }
        
        function checkConnection() {
            fetchAPI('checkConnection').then(r => {
                const dot = document.getElementById('dot');
                if (r && r.connected) { dot.classList.remove('off'); document.getElementById('statusText').textContent = 'Online'; }
                else { dot.classList.add('off'); document.getElementById('statusText').textContent = 'Offline'; setTimeout(checkConnection, 3000); }
            });
        }
        
        function loadProducts() {
            showLoading();
            fetchAPI('getProducts').then(data => {
                hideLoading();
                products = Array.isArray(data) ? data : [];
                renderProducts();
            });
        }
        
        function renderProducts() {
            const area = document.getElementById('productArea');
            if (products.length === 0) {
                area.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">📦 Belum ada produk</div>';
                return;
            }
            
            if (filter === 'Semua') {
                const cats = [
                    { key: 'Nasi Kuning', title: '🍚 Nasi Kuning', cls: 'cat-nk' },
                    { key: 'Lauk', title: '🍗 Lauk', cls: 'cat-lauk' },
                    { key: 'Sembako', title: '🛒 Sembako', cls: 'cat-sembako' }
                ];
                
                let html = '';
                cats.forEach(cat => {
                    const items = products.filter(p => p.category === cat.key);
                    if (items.length > 0) {
                        html += `<div class="cat-title ${cat.cls}">${cat.title}</div>`;
                        html += '<div class="product-list">' + items.map(p => productCard(p)).join('') + '</div>';
                    }
                });
                area.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--muted);">📦 Belum ada produk</div>';
            } else {
                const filtered = products.filter(p => p.category === filter);
                if (filtered.length === 0) {
                    area.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">Tidak ada produk</div>';
                    return;
                }
                area.innerHTML = '<div class="product-list">' + filtered.map(p => productCard(p)).join('') + '</div>';
            }
        }
        
        function productCard(p) {
            return `<div class="product-card" onclick="addToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.category}')">
                <div class="pcat">${p.category}</div>
                <div class="pname">${p.name}</div>
                <div class="pprice">${formatRupiah(p.price)}</div>
            </div>`;
        }
        
        function filterCat(cat, el) {
            filter = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderProducts();
        }
        
        function addToCart(id, name, price, cat) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, name, price, category: cat, qty: 1 });
            updateCart();
            toast('✅ Ditambahkan');
        }
        
        function updateQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCart();
        }
        
        function clearCart() { cart = []; updateCart(); toast('🗑️ Dikosongkan'); }
        
        function updateCart() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            const btn = document.getElementById('btnPay');
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="color:var(--muted);font-size:11px;text-align:center;padding:8px;">🛒 Keranjang kosong</div>';
                totalEl.textContent = 'Rp 0';
                btn.disabled = true;
                return;
            }
            
            container.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div style="flex:1;font-size:11px;">${item.name}</div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="updateQty(${i}, -1)">−</button>
                        <span style="min-width:20px;text-align:center;font-weight:700;">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${i}, 1)">+</button>
                    </div>
                    <div class="item-total">${formatRupiah(item.price * item.qty)}</div>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            totalEl.textContent = formatRupiah(total);
            btn.disabled = false;
        }
        
        function getCartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
        
        function openPayment() {
            if (cart.length === 0) return;
            const total = getCartTotal();
            document.getElementById('payAmount').textContent = formatRupiah(total);
            document.getElementById('qrisAmount').textContent = formatRupiah(total);
            
            // Rekomendasi uang yang masuk akal
            const suggestions = document.getElementById('moneySuggestions');
            let amounts = [];
            // Bulatkan ke atas
            const r500 = Math.ceil(total / 500) * 500;
            const r1000 = Math.ceil(total / 1000) * 1000;
            const r5000 = Math.ceil(total / 5000) * 5000;
            const r10000 = Math.ceil(total / 10000) * 10000;
            
            amounts.push(r500, r1000, r5000, r10000);
            // Tambah pecahan besar yang masuk akal
            PECAHAN.forEach(p => { if (p >= total && p <= total * 3) amounts.push(p); });
            
            // Remove duplicates & sort
            amounts = [...new Set(amounts)].filter(a => a >= total).sort((a,b) => a-b).slice(0, 6);
            
            suggestions.innerHTML = amounts.map(a => 
                `<div class="money-chip" onclick="setCash(${a})">${formatRupiah(a)}</div>`
            ).join('');
            
            document.getElementById('cashReceived').value = '';
            document.getElementById('changeDisplay').style.display = 'none';
            document.getElementById('tunaiSection').style.display = 'block';
            document.getElementById('qrisSection').style.display = 'none';
            payment = 'Tunai';
            document.querySelectorAll('.pay-opt').forEach((el, i) => el.classList.toggle('active', i === 0));
            
            openModal('paymentModal');
        }
        
        function setPayment(method, el) {
            payment = method;
            document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('tunaiSection').style.display = method === 'Tunai' ? 'block' : 'none';
            document.getElementById('qrisSection').style.display = method === 'QRIS' ? 'block' : 'none';
        }
        
        function setCash(amount) {
            document.getElementById('cashReceived').value = amount;
            calculateChange();
        }
        
        function calculateChange() {
            const total = getCartTotal();
            const received = Number(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            const display = document.getElementById('changeDisplay');
            
            if (received <= 0) { display.style.display = 'none'; return; }
            display.style.display = 'block';
            
            if (change < 0) {
                display.innerHTML = `<div style="color:var(--danger);font-weight:700;">❌ Kurang ${formatRupiah(Math.abs(change))}</div>`;
                return;
            }
            
            let remaining = change;
            let detail = [];
            PECAHAN.forEach(p => {
                const count = Math.floor(remaining / p);
                if (count > 0) { detail.push(`${count}× ${formatRupiah(p)}`); remaining -= count * p; }
            });
            
            display.innerHTML = `
                <div style="color:var(--success);font-weight:800;font-size:16px;">💰 Kembalian: ${formatRupiah(change)}</div>
                ${detail.length > 0 ? `<div style="font-size:10px;color:var(--muted);margin-top:3px;">${detail.join(', ')}</div>` : '<div style="font-size:10px;color:var(--muted);">Uang pas</div>'}
            `;
        }
        
        function processPayment() {
            if (payment === 'Tunai') {
                const total = getCartTotal();
                const received = Number(document.getElementById('cashReceived').value) || 0;
                if (received < total) { toast('⚠️ Uang kurang!', true); return; }
            }
            
            closeModal('paymentModal');
            showLoading();
            
            fetchAPI('saveTransaction', {
                items: cart.map(i => ({ id:i.id, name:i.name, category:i.category, price:i.price, qty:i.qty })),
                total: getCartTotal(),
                payment: payment
            }).then(r => {
                hideLoading();
                if (r && r.success) {
                    const change = payment === 'Tunai' ? (Number(document.getElementById('cashReceived').value) || 0) - getCartTotal() : 0;
                    cart = [];
                    updateCart();
                    toast('✅ Berhasil! ' + r.session);
                    if (change > 0) setTimeout(() => toast('💰 Kembalian: ' + formatRupiah(change)), 1500);
                } else { toast('❌ Gagal!', true); }
            });
        }
        
        function addProduct() {
            const name = document.getElementById('pName').value.trim();
            const cat = document.getElementById('pCat').value;
            const price = document.getElementById('pPrice').value;
            if (!name || !price) return toast('⚠️ Isi semua!', true);
            
            showLoading();
            fetchAPI('addProduct', { name, category: cat, price: Number(price) }).then(r => {
                hideLoading();
                if (r && r.success) {
                    document.getElementById('pName').value = '';
                    document.getElementById('pPrice').value = '';
                    toast('✅ Ditambahkan!');
                    loadProducts();
                    populateSelects();
                } else { toast('❌ Gagal!', true); }
            });
        }
        
        function updateProductPrice() {
            const id = document.getElementById('updateSelect').value;
            const price = document.getElementById('updatePrice').value;
            if (!id || !price) return toast('⚠️ Lengkapi!', true);
            
            showLoading();
            fetchAPI('updatePrice', { id, price: Number(price) }).then(r => {
                hideLoading();
                if (r && r.success) { document.getElementById('updatePrice').value = ''; toast('✅ Diupdate!'); loadProducts(); }
                else { toast('❌ Gagal!', true); }
            });
        }
        
        function deleteProduct() {
            const id = document.getElementById('deleteSelect').value;
            if (!id || !confirm('Nonaktifkan?')) return;
            
            showLoading();
            fetchAPI('deleteProduct', { id }).then(r => {
                hideLoading();
                if (r && r.success) { toast('✅ Dinonaktifkan!'); loadProducts(); populateSelects(); }
                else { toast('❌ Gagal!', true); }
            });
        }
        
        function populateSelects() {
            fetchAPI('getProducts').then(data => {
                if (!Array.isArray(data)) return;
                const opts = data.map(p => `<option value="${p.id}">${p.name} - ${formatRupiah(p.price)}</option>`).join('');
                document.getElementById('updateSelect').innerHTML = opts;
                document.getElementById('deleteSelect').innerHTML = opts;
            });
        }
        
        function switchReport() {
            document.getElementById('dailyDate').style.display = document.getElementById('reportType').value === 'daily' ? 'block' : 'none';
            document.getElementById('monthlyDate').style.display = document.getElementById('reportType').value === 'monthly' ? 'block' : 'none';
            loadReport();
        }
        
        function loadReport() {
            const type = document.getElementById('reportType').value;
            showLoading();
            
            if (type === 'daily') {
                const date = document.getElementById('rDate').value;
                if (!date) { hideLoading(); return; }
                console.log('Loading daily report for:', date);
                fetchAPI('getDailyReport', null, '&date=' + date).then(r => {
                    hideLoading();
                    console.log('Daily report response:', r);
                    displayDaily(r);
                }).catch(e => { hideLoading(); console.error(e); });
            } else {
                const mv = document.getElementById('rMonth').value;
                if (!mv) { hideLoading(); return; }
                const [y, m] = mv.split('-');
                fetchAPI('getMonthlyReport', null, '&month=' + m + '&year=' + y).then(r => {
                    hideLoading();
                    displayMonthly(r);
                }).catch(e => { hideLoading(); console.error(e); });
            }
        }
        
        function catRow(label, data) {
            if (!data) return '';
            return `<div style="margin:4px 0;padding:6px;background:rgba(255,255,255,0.02);border-radius:6px;">
                <div style="font-weight:700;font-size:11px;">${label}</div>
                <div class="report-row"><span>💵 Tunai</span><span>${formatRupiah(data.tunai||0)}</span></div>
                <div class="report-row"><span>📱 QRIS</span><span>${formatRupiah(data.qris||0)}</span></div>
                <div class="report-row" style="color:var(--primary);font-weight:700;"><span>Total</span><span>${formatRupiah(data.total||0)}</span></div>
            </div>`;
        }
        
        function displayDaily(r) {
            const c = document.getElementById('reportContent');
            if (!r || r.total === undefined || r.total === null) {
                c.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">📭 Tidak ada data</p>';
                return;
            }
            
            c.innerHTML = `
                <div class="report-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <strong>📅 ${r.date}</strong>
                        <button class="btn" style="padding:5px 10px;font-size:10px;background:transparent;border:1px solid var(--border);color:var(--primary);" onclick="showDetail('${r.date}')">📋 Rincian</button>
                    </div>
                    <div style="color:#fbbf24;font-weight:700;font-size:11px;">🌅 Pagi (${r.pagi?.trx||0} transaksi)</div>
                    ${catRow('🍚 Nasi Kuning', r.pagi?.nk)}
                    ${catRow('🍗 Lauk', r.pagi?.lauk)}
                    ${catRow('🛒 Sembako', r.pagi?.sembako)}
                    <div class="report-total">Subtotal Pagi: ${formatRupiah(r.pagi?.total||0)}</div>
                    
                    <div style="color:#818cf8;font-weight:700;font-size:11px;margin-top:10px;">🌙 Malam (${r.malam?.trx||0} transaksi)</div>
                    ${catRow('🍚 Nasi Kuning', r.malam?.nk)}
                    ${catRow('🍗 Lauk', r.malam?.lauk)}
                    ${catRow('🛒 Sembako', r.malam?.sembako)}
                    <div class="report-total">Subtotal Malam: ${formatRupiah(r.malam?.total||0)}</div>
                    
                    <div class="report-total" style="color:var(--primary);font-size:15px;">💰 Total: ${formatRupiah(r.total||0)}</div>
                </div>
            `;
        }
        
        function showDetail(date) {
            showLoading();
            fetchAPI('getDailyDetail', null, '&date=' + date).then(r => {
                hideLoading();
                const c = document.getElementById('detailContent');
                if (!r || !r.transactions || r.transactions.length === 0) {
                    c.innerHTML = '<p style="text-align:center;color:var(--muted);">Tidak ada transaksi</p>';
                } else {
                    let html = `<p style="font-size:11px;color:var(--muted);margin-bottom:8px;">📅 ${date} · ${r.transactions.length} transaksi</p>`;
                    r.transactions.forEach(t => {
                        html += `<div class="detail-item">
                            <div class="detail-header"><span>#${t.id.slice(-8)}</span><span style="color:${t.session==='Pagi'?'#fbbf24':'#818cf8'}">${t.session==='Pagi'?'🌅':'🌙'} ${t.time}</span></div>
                            ${t.items.map(i => `<div class="report-row"><span>${i.name} ×${i.qty}</span><span>${formatRupiah(i.subtotal)}</span></div>`).join('')}
                            <div style="font-weight:700;margin-top:4px;padding-top:4px;border-top:1px solid var(--border);display:flex;justify-content:space-between;"><span>${t.payment}</span><span>${formatRupiah(t.total)}</span></div>
                        </div>`;
                    });
                    c.innerHTML = html;
                }
                openModal('detailModal');
            }).catch(e => { hideLoading(); });
        }
        
        function displayMonthly(r) {
            const c = document.getElementById('reportContent');
            if (!r || r.total === undefined || r.total === null) {
                c.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">📭 Tidak ada data</p>';
                return;
            }
            
            let days = '';
            if (r.days) Object.keys(r.days).sort().forEach(d => { days += `<div class="report-row"><span>📅 Tgl ${d}</span><span>${formatRupiah(r.days[d])}</span></div>`; });
            
            const nk = r.cat?.nk || {}, lauk = r.cat?.lauk || {}, sembako = r.cat?.sembako || {};
            
            c.innerHTML = `<div class="report-card">
                <strong>📆 ${r.month}/${r.year}</strong>
                <div style="color:#fbbf24;font-weight:700;font-size:11px;margin-top:8px;">🌅 Pagi</div>
                ${catRow('🍚 Nasi Kuning', nk.pagi)} ${catRow('🍗 Lauk', lauk.pagi)} ${catRow('🛒 Sembako', sembako.pagi)}
                <div style="color:#818cf8;font-weight:700;font-size:11px;margin-top:8px;">🌙 Malam</div>
                ${catRow('🍚 Nasi Kuning', nk.malam)} ${catRow('🍗 Lauk', lauk.malam)} ${catRow('🛒 Sembako', sembako.malam)}
                ${days ? '<div style="font-weight:700;margin-top:8px;">📅 Per Hari</div>' + days : ''}
                <div class="report-total" style="color:var(--primary);font-size:15px;">💰 Total: ${formatRupiah(r.total||0)}</div>
            </div>`;
        }
        
        function openModal(id) {
            document.getElementById(id).classList.add('show');
            if (id === 'productModal') populateSelects();
            if (id === 'reportModal') loadReport();
        }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        
        function toast(msg, isErr = false) {
            const el = document.createElement('div');
            el.className = 'toast' + (isErr ? ' err' : '');
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = '0.3s'; setTimeout(() => el.remove(), 300); }, 2000);
        }
        
        function showLoading() { document.getElementById('loading').classList.add('show'); }
        function hideLoading() { document.getElementById('loading').classList.remove('show'); }
        
        document.addEventListener('click', e => { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); });
    </script>
</body>
</html>
