<!DOCTYPE html>
<html>
<head><title>TEST POS</title></head>
<body>
    <h2>TEST TOKO N-Dhonk</h2>
    
    <button onclick="testConnection()">1. Test Koneksi</button><br><br>
    <button onclick="testAddProduct()">2. Test Tambah Produk</button><br><br>
    <button onclick="testGetProducts()">3. Test Ambil Produk</button><br><br>
    
    <pre id="result" style="background:#1e293b; color:#38bdf8; padding:16px; border-radius:8px;"></pre>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycby0mpLoFPYZe5Yp_YMkrJAXSOhHPM1X-WA5Hgq5ciPCl1osy9WUs_LKu3k0mqt6EsLG/exec';
        
        function log(msg) {
            document.getElementById('result').textContent += msg + '\n';
        }
        
        async function testConnection() {
            document.getElementById('result').textContent = '';
            log('Testing connection...');
            try {
                const res = await fetch(API + '?action=checkConnection');
                const data = await res.json();
                log('Response: ' + JSON.stringify(data, null, 2));
                if (data.connected) {
                    log('✅ KONEKSI BERHASIL!');
                } else {
                    log('❌ KONEKSI GAGAL');
                }
            } catch(e) {
                log('❌ ERROR: ' + e.message);
                log('Pastikan:');
                log('1. Apps Script sudah di-deploy sebagai Web App');
                log('2. Akses diset ke "Anyone"');
                log('3. URL sudah benar');
            }
        }
        
        async function testAddProduct() {
            document.getElementById('result').textContent = '';
            log('Testing add product...');
            try {
                const res = await fetch(API + '?action=addProduct', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: 'Test Product ' + new Date().getSeconds(),
                        category: 'Sembako',
                        price: 5000
                    })
                });
                const data = await res.json();
                log('Response: ' + JSON.stringify(data, null, 2));
                if (data.success) {
                    log('✅ TAMBAH PRODUK BERHASIL!');
                } else {
                    log('❌ GAGAL: ' + (data.message || 'Unknown error'));
                }
            } catch(e) {
                log('❌ ERROR: ' + e.message);
            }
        }
        
        async function testGetProducts() {
            document.getElementById('result').textContent = '';
            log('Testing get products...');
            try {
                const res = await fetch(API + '?action=getProducts');
                const data = await res.json();
                log('Jumlah produk: ' + (Array.isArray(data) ? data.length : 'error'));
                log('Data: ' + JSON.stringify(data, null, 2));
                if (Array.isArray(data)) {
                    log('✅ AMBIL PRODUK BERHASIL!');
                }
            } catch(e) {
                log('❌ ERROR: ' + e.message);
            }
        }
    </script>
</body>
</html>
