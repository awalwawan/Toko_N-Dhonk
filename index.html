<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKO N-Dhonk POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --primary: #38bdf8; --text: #f1f5f9; --muted: #94a3b8;
            --success: #34d399; --danger: #f87171; --warning: #fbbf24;
            --nk: #f59e0b; --lauk: #ef4444; --sembako: #8b5cf6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        
        .app { max-width:100%; margin:0 auto; }
        @media (min-width: 768px) { .app { max-width: 480px; } }
        
        /* Top Bar */
        .topbar { background:var(--card); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; font-size:12px; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); }
        .dot { width:8px; height:8px; border-radius:50%; background:var(--success); display:inline-block; margin-right:6px; }
        .dot.off { background:var(--danger); }
        .session { padding:5px 12px; border-radius:20px; font-weight:700; font-size:11px; }
        .session.pagi { background:#fbbf24; color:#000; }
        .session.malam { background:#6366f1; color:#fff; }
        
        /* Header */
        .header { padding:16px; display:flex; align-items:center; gap:12px; }
        .logo { width:48px; height:48px; background:linear-gradient(135deg,#0ea5e9,#8b5cf6); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; }
        .header h1 { font-size:18px; font-weight:800; }
        .header p { font-size:10px; color:var(--muted); }
        .header-actions { margin-left:auto; display:flex; gap:6px; }
        .hbtn { width:38px; height:38px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        
        /* Category Tabs */
        .tabs { padding:8px 12px; display:flex; gap:6px; overflow-x:auto; }
        .tab { padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-weight:600; font-size:12px; cursor:pointer; white-space:nowrap; }
        .tab.active { background:linear-gradient(135deg,#0ea5e9,#8b5cf6); color:#fff; border-color:transparent; }
        
        /* Products - Grid per kategori */
        .category-section { padding:8px 12px; }
        .category-title { font-size:13px; font-weight:700; margin-bottom:8px; padding:6px 10px; border-radius:8px; display:flex; align-items:center; gap:6px; }
        .cat-nk { background:rgba(245,158,11,0.15); color:var(--nk); }
        .cat-lauk { background:rgba(239,68,68,0.15); color:var(--lauk); }
        .cat-sembako { background:rgba(139,92,246,0.15); color:var(--sembako); }
        
        .product-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
        .product-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; cursor:pointer; transition:all 0.15s; }
        .product-card:active { border-color:var(--primary); transform:scale(0.97); }
        .product-card .emoji { font-size:28px; display:block; margin-bottom:6px; }
        .product-card .pname { font-weight:600; font-size:12px; margin-bottom:3px; line-height:1.2; }
        .product-card .pprice { font-weight:700; font-size:14px; color:var(--primary); }
        
        .empty-section { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
        
        /* Cart */
        .cart { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--card); border-radius:20px 20px 0 0; padding:14px; box-shadow:0 -4px 20px rgba(0,0,0,0.5); z-index:200; }
        .cart-chips { display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; min-height:26px; flex-wrap:wrap; }
        .chip { background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.2); padding:5px 10px; border-radius:16px; font-size:11px; font-weight:600; white-space:nowrap; display:flex; align-items:center; gap:5px; }
        .chip span { color:var(--danger); cursor:pointer; font-weight:700; font-size:13px; }
        .cart-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .cart-label { font-size:12px; color:var(--muted); }
        .cart-total { font-weight:800; font-size:22px; color:var(--primary); }
        .cart-actions { display:flex; gap:6px; }
        .btn { padding:12px; border-radius:12px; border:none; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
        .btn:active { transform:scale(0.97); }
        .btn-pay { flex:1; background:linear-gradient(135deg,#0ea5e9,#8b5cf6); color:#fff; font-size:14px; }
        .btn-pay:disabled { opacity:0.4; pointer-events:none; }
        .btn-clr { background:transparent; border:1px solid var(--border); color:var(--danger); min-width:44px; }
        
        /* Modal */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; padding:16px; }
        .modal.show { display:flex; }
        .modal-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; }
        .modal-box h3 { font-size:17px; margin-bottom:14px; }
        .modal-close { float:right; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600; }
        .form-group input, .form-group select { width:100%; padding:11px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; font-family:inherit; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--primary); }
        
        /* Payment Modal */
        .pay-opts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:14px 0; }
        .pay-opt { padding:16px; border:2px solid var(--border); border-radius:12px; text-align:center; cursor:pointer; font-weight:600; font-size:13px; }
        .pay-opt.active { border-color:var(--primary); background:rgba(56,189,248,0.1); }
        .pay-opt .icon { font-size:24px; display:block; margin-bottom:6px; }
        
        .money-suggestions { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
        .money-chip { padding:8px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:12px; font-weight:600; cursor:pointer; }
        .money-chip:active { background:var(--primary); color:#fff; }
        
        .change-display { background:var(--bg); padding:12px; border-radius:10px; margin:10px 0; text-align:center; }
        .change-amount { font-size:24px; font-weight:800; color:var(--success); }
        .change-detail { font-size:11px; color:var(--muted); margin-top:4px; }
        
        /* Report */
        .report-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; }
        .report-card h4 { margin-bottom:8px; font-size:13px; }
        .report-row { display:flex; justify-content:space-between; padding:5px 0; font-size:12px; color:var(--muted); border-bottom:1px solid rgba(51,65,85,0.5); }
        .report-total { font-weight:700; margin-top:8px; padding-top:8px; border-top:2px solid var(--border); }
        .grand { font-size:17px; color:var(--primary); }
        
        .detail-item { background:var(--card); border-radius:8px; padding:10px; margin-bottom:8px; }
        .detail-header { display:flex; justify-content:space-between; font-weight:700; font-size:13px; margin-bottom:6px; }
        .detail-row { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); padding:2px 0; }
        
        .btn-sm { padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--primary); font-weight:600; font-size:11px; cursor:pointer; font-family:inherit; }
        
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:var(--card); border-left:3px solid var(--success); padding:12px 16px; border-radius:10px; z-index:3000; font-size:12px; font-weight:500; animation:slideIn 0.3s ease; }
        .toast.err { border-color:var(--danger); }
        @keyframes slideIn { from{opacity:0;transform:translateX(-50%) translateY(-20px);} }
        
        .loading { display:none; position:fixed; inset:0; background:rgba(15,23,42,0.9); z-index:4000; justify-content:center; align-items:center; }
        .loading.show { display:flex; }
        .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div><span class="dot" id="dot"></span> <span id="statusText">...</span></div>
            <div style="font-weight:700;" id="clock">--:--</div>
            <div class="session pagi" id="sessionBadge">🌅 PAGI</div>
        </div>
        
        <div class="header">
            <div class="logo">🏪</div>
            <div>
                <h1>TOKO N-Dhonk</h1>
                <p>Nasi Kuning · Lauk · Sembako</p>
            </div>
            <div class="header-actions">
                <button class="hbtn" onclick="openModal('reportModal')">📊</button>
                <button class="hbtn" onclick="openModal('productModal')">📦</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="filterCat('Semua',this)">📦 Semua</button>
            <button class="tab" onclick="filterCat('Nasi Kuning',this)">🍚 Nasi Kuning</button>
            <button class="tab" onclick="filterCat('Lauk',this)">🍗 Lauk</button>
            <button class="tab" onclick="filterCat('Sembako',this)">🛒 Sembako</button>
        </div>
        
        <div id="productArea"></div>
        
        <div class="cart">
            <div class="cart-chips" id="cartChips"><div style="color:var(--muted);font-size:11px;">🛒 Keranjang kosong</div></div>
            <div class="cart-row"><span class="cart-label">Total</span><span class="cart-total" id="cartTotal">Rp 0</span></div>
            <div class="cart-actions">
                <button class="btn btn-clr" onclick="clearCart()">🗑️</button>
                <button class="btn btn-pay" id="btnPay" onclick="openPayment()" disabled>💳 Bayar</button>
            </div>
        </div>
    </div>
    
    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('paymentModal')">✕</button>
            <h3>💳 Pembayaran</h3>
            <div class="pay-opts">
                <div class="pay-opt active" onclick="setPayment('Tunai',this)"><span class="icon">💵</span>Tunai</div>
                <div class="pay-opt" onclick="setPayment('QRIS',this)"><span class="icon">📱</span>QRIS</div>
            </div>
            
            <div id="tunaiSection">
                <div class="cart-row"><span>Total</span><span class="cart-total" id="payAmount">Rp 0</span></div>
                
                <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;">💡 Rekomendasi Uang:</div>
                <div class="money-suggestions" id="moneySuggestions"></div>
                
                <div class="form-group">
                    <label>Uang Diterima (Rp)</label>
                    <input type="number" id="cashReceived" placeholder="Masukkan jumlah uang" oninput="calculateChange()">
                </div>
                
                <div class="change-display" id="changeDisplay" style="display:none;">
                    <div class="change-amount" id="changeAmount">Rp 0</div>
                    <div class="change-detail" id="changeDetail"></div>
                </div>
            </div>
            
            <div id="qrisSection" style="display:none;">
                <div style="text-align:center; padding:20px;">
                    <div style="font-size:60px; margin-bottom:10px;">📱</div>
                    <div class="cart-total" id="qrisAmount">Rp 0</div>
                    <p style="color:var(--muted);font-size:12px;">Scan QRIS untuk membayar</p>
                </div>
            </div>
            
            <button class="btn btn-pay" onclick="processPayment()" style="width:100%; margin-top:12px;">✅ Konfirmasi Pembayaran</button>
        </div>
    </div>
    
    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('productModal')">✕</button>
            <h3>➕ Tambah Produk</h3>
            <div class="form-group"><label>Nama</label><input type="text" id="pName" placeholder="Nama produk"></div>
            <div class="form-group"><label>Kategori</label><select id="pCat"><option value="Nasi Kuning">Nasi Kuning</option><option value="Lauk">Lauk</option><option value="Sembako">Sembako</option></select></div>
            <div class="form-group"><label>Harga (Rp)</label><input type="number" id="pPrice" placeholder="Harga"></div>
            <button class="btn btn-pay" onclick="addProduct()" style="width:100%;">Simpan</button>
            
            <hr style="border-color:var(--border); margin:16px 0;">
            
            <h3>💰 Update Harga</h3>
            <div class="form-group"><label>Produk</label><select id="updateSelect"></select></div>
            <div class="form-group"><label>Harga Baru (Rp)</label><input type="number" id="updatePrice" placeholder="Harga baru"></div>
            <button class="btn" style="background:#f97316;color:#fff;width:100%;" onclick="updateProductPrice()">Update</button>
            
            <hr style="border-color:var(--border); margin:16px 0;">
            
            <h3>🗑️ Nonaktifkan</h3>
            <div class="form-group"><label>Produk</label><select id="deleteSelect"></select></div>
            <button class="btn" style="background:var(--danger);color:#fff;width:100%;" onclick="deleteProduct()">Nonaktifkan</button>
        </div>
    </div>
    
    <!-- Report Modal -->
    <div class="modal" id="reportModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('reportModal')">✕</button>
            <h3>📊 Laporan</h3>
            <div class="form-group"><label>Jenis</label><select id="reportType" onchange="switchReport()"><option value="daily">Harian</option><option value="monthly">Bulanan</option></select></div>
            <div id="dailyDate"><div class="form-group"><label>Tanggal</label><input type="date" id="rDate" onchange="loadReport()"></div></div>
            <div id="monthlyDate" style="display:none;"><div class="form-group"><label>Bulan</label><input type="month" id="rMonth" onchange="loadReport()"></div></div>
            <div id="reportContent"></div>
        </div>
    </div>
    
    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
            <h3>📋 Rincian Transaksi</h3>
            <div id="detailContent"></div>
        </div>
    </div>
    
    <div id="toastContainer" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:3000;width:90%;max-width:400px;"></div>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <script>
        // ⚠️ GANTI DENGAN URL DEPLOYMENT ANDA
        const API = 'https://script.google.com/macros/s/AKfycby0mpLoFPYZe5Yp_YMkrJAXSOhHPM1X-WA5Hgq5ciPCl1osy9WUs_LKu3k0mqt6EsLG/exec';
        
        const PECAHAN = [100000, 50000, 20000, 10000, 5000, 2000, 1000, 500];
        
        let products = [], cart = [], filter = 'Semua', payment = 'Tunai';
        
        document.addEventListener('DOMContentLoaded', () => {
            setDates();
            updateClock();
            setInterval(updateClock, 30000);
            checkConnection();
            loadProducts();
        });
        
        function setDates() {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('rDate').value = now;
            document.getElementById('rMonth').value = now.slice(0,7);
        }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours() + ':' + now.getMinutes().toString().padStart(2,'0');
            const badge = document.getElementById('sessionBadge');
            const h = now.getHours();
            if (h >= 6 && h < 17) { badge.textContent = '🌅 PAGI'; badge.className = 'session pagi'; }
            else { badge.textContent = '🌙 MALAM'; badge.className = 'session malam'; }
        }
        
        function formatRupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
        
        async function fetchAPI(action, data = null, params = '') {
            try {
                let url = API + '?action=' + action + params;
                let opts = { method: 'GET' };
                if (data) { opts.method = 'POST'; opts.body = JSON.stringify(data); }
                const res = await fetch(url, opts);
                return await res.json();
            } catch(e) { return { error: true, message: e.message }; }
        }
        
        function checkConnection() {
            fetchAPI('checkConnection').then(r => {
                const dot = document.getElementById('dot');
                if (r.connected) { dot.classList.remove('off'); document.getElementById('statusText').textContent = 'Online'; }
                else { dot.classList.add('off'); document.getElementById('statusText').textContent = 'Offline'; setTimeout(checkConnection, 3000); }
            });
        }
        
        function loadProducts() {
            showLoading();
            fetchAPI('getProducts').then(data => {
                hideLoading();
                products = Array.isArray(data) ? data : [];
                renderProducts();
            });
        }
        
        function renderProducts() {
            const area = document.getElementById('productArea');
            
            if (products.length === 0) {
                area.innerHTML = '<div class="empty-section">📦<br>Belum ada produk</div>';
                return;
            }
            
            let filtered = filter === 'Semua' ? products : products.filter(p => p.category === filter);
            
            if (filter === 'Semua') {
                // Group by category
                const nk = products.filter(p => p.category === 'Nasi Kuning');
                const lauk = products.filter(p => p.category === 'Lauk');
                const sembako = products.filter(p => p.category === 'Sembako');
                
                let html = '';
                
                if (nk.length > 0) {
                    html += '<div class="category-section"><div class="category-title cat-nk">🍚 Nasi Kuning</div><div class="product-row">';
                    nk.forEach(p => html += productCard(p));
                    html += '</div></div>';
                }
                
                if (lauk.length > 0) {
                    html += '<div class="category-section"><div class="category-title cat-lauk">🍗 Lauk</div><div class="product-row">';
                    lauk.forEach(p => html += productCard(p));
                    html += '</div></div>';
                }
                
                if (sembako.length > 0) {
                    html += '<div class="category-section"><div class="category-title cat-sembako">🛒 Sembako</div><div class="product-row">';
                    sembako.forEach(p => html += productCard(p));
                    html += '</div></div>';
                }
                
                area.innerHTML = html || '<div class="empty-section">📦<br>Belum ada produk</div>';
            } else {
                if (filtered.length === 0) {
                    area.innerHTML = '<div class="empty-section">📦<br>Tidak ada produk di kategori ini</div>';
                    return;
                }
                area.innerHTML = '<div class="category-section"><div class="product-row">' + filtered.map(p => productCard(p)).join('') + '</div></div>';
            }
        }
        
        function productCard(p) {
            const emoji = p.category === 'Nasi Kuning' ? '🍚' : p.category === 'Lauk' ? '🍗' : '🛒';
            return `<div class="product-card" onclick="addToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.category}')">
                <span class="emoji">${emoji}</span>
                <div class="pname">${p.name}</div>
                <div class="pprice">${formatRupiah(p.price)}</div>
            </div>`;
        }
        
        function filterCat(cat, el) {
            filter = cat;
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderProducts();
        }
        
        function addToCart(id, name, price, cat) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, name, price, category: cat, qty: 1 });
            updateCart();
            toast('✅ Ditambahkan');
        }
        
        function removeFromCart(i) { cart.splice(i, 1); updateCart(); }
        
        function clearCart() { cart = []; updateCart(); toast('🗑️ Dikosongkan'); }
        
        function updateCart() {
            const chips = document.getElementById('cartChips');
            const total = document.getElementById('cartTotal');
            const btn = document.getElementById('btnPay');
            
            if (cart.length === 0) {
                chips.innerHTML = '<div style="color:var(--muted);font-size:11px;">🛒 Keranjang kosong</div>';
                total.textContent = 'Rp 0';
                btn.disabled = true;
                return;
            }
            
            chips.innerHTML = cart.map((item, i) => `
                <div class="chip">${item.name} ×${item.qty} <span onclick="event.stopPropagation();removeFromCart(${i})">×</span></div>
            `).join('');
            
            const sum = cart.reduce((s, i) => s + i.price * i.qty, 0);
            total.textContent = formatRupiah(sum);
            btn.disabled = false;
        }
        
        function getCartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
        
        function openPayment() {
            if (cart.length === 0) return;
            const total = getCartTotal();
            document.getElementById('payAmount').textContent = formatRupiah(total);
            document.getElementById('qrisAmount').textContent = formatRupiah(total);
            
            // Generate money suggestions
            const suggestions = document.getElementById('moneySuggestions');
            let html = '';
            PECAHAN.forEach(p => {
                if (p >= total || p >= total - 10000) {
                    html += `<div class="money-chip" onclick="setCash(${p})">${formatRupiah(p)}</div>`;
                }
            });
            // Always add custom round up
            const roundedUp = Math.ceil(total / 5000) * 5000;
            if (!PECAHAN.includes(roundedUp) || roundedUp === total) {
                html += `<div class="money-chip" onclick="setCash(${roundedUp})">${formatRupiah(roundedUp)} (bulat)</div>`;
            }
            suggestions.innerHTML = html;
            
            document.getElementById('cashReceived').value = '';
            document.getElementById('changeDisplay').style.display = 'none';
            document.getElementById('tunaiSection').style.display = 'block';
            document.getElementById('qrisSection').style.display = 'none';
            payment = 'Tunai';
            document.querySelectorAll('.pay-opt').forEach((el, i) => el.classList.toggle('active', i === 0));
            
            openModal('paymentModal');
        }
        
        function setPayment(method, el) {
            payment = method;
            document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('tunaiSection').style.display = method === 'Tunai' ? 'block' : 'none';
            document.getElementById('qrisSection').style.display = method === 'QRIS' ? 'block' : 'none';
        }
        
        function setCash(amount) {
            document.getElementById('cashReceived').value = amount;
            calculateChange();
        }
        
        function calculateChange() {
            const total = getCartTotal();
            const received = Number(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            const display = document.getElementById('changeDisplay');
            
            if (received <= 0) {
                display.style.display = 'none';
                return;
            }
            
            display.style.display = 'block';
            
            if (change < 0) {
                document.getElementById('changeAmount').textContent = '❌ Uang kurang ' + formatRupiah(Math.abs(change));
                document.getElementById('changeAmount').style.color = 'var(--danger)';
                document.getElementById('changeDetail').textContent = '';
                return;
            }
            
            document.getElementById('changeAmount').style.color = 'var(--success)';
            document.getElementById('changeAmount').textContent = '💰 Kembalian: ' + formatRupiah(change);
            
            // Calculate pecahan
            let remaining = change;
            let detail = [];
            PECAHAN.forEach(p => {
                const count = Math.floor(remaining / p);
                if (count > 0) {
                    detail.push(`${count}× ${formatRupiah(p)}`);
                    remaining -= count * p;
                }
            });
            
            document.getElementById('changeDetail').textContent = detail.length > 0 ? 'Pecahan: ' + detail.join(', ') : 'Uang pas';
        }
        
        function processPayment() {
            if (payment === 'Tunai') {
                const total = getCartTotal();
                const received = Number(document.getElementById('cashReceived').value) || 0;
                if (received < total) {
                    toast('⚠️ Uang kurang!', true);
                    return;
                }
            }
            
            closeModal('paymentModal');
            showLoading();
            
            const total = getCartTotal();
            
            fetchAPI('saveTransaction', {
                items: cart.map(i => ({ id:i.id, name:i.name, category:i.category, price:i.price, qty:i.qty })),
                total: total,
                payment: payment
            }).then(r => {
                hideLoading();
                if (r.success) {
                    cart = [];
                    updateCart();
                    toast('✅ Berhasil! ' + r.session);
                    if (payment === 'Tunai') {
                        const received = Number(document.getElementById('cashReceived').value) || 0;
                        const change = received - total;
                        if (change > 0) toast('💰 Kembalian: ' + formatRupiah(change));
                    }
                } else {
                    toast('❌ Gagal!', true);
                }
            });
        }
        
        function addProduct() {
            const name = document.getElementById('pName').value.trim();
            const cat = document.getElementById('pCat').value;
            const price = document.getElementById('pPrice').value;
            if (!name || !price) return toast('⚠️ Isi semua field!', true);
            
            showLoading();
            fetchAPI('addProduct', { name, category: cat, price: Number(price) }).then(r => {
                hideLoading();
                if (r.success) {
                    document.getElementById('pName').value = '';
                    document.getElementById('pPrice').value = '';
                    toast('✅ Ditambahkan!');
                    loadProducts();
                    populateSelects();
                } else { toast('❌ Gagal!', true); }
            });
        }
        
        function updateProductPrice() {
            const id = document.getElementById('updateSelect').value;
            const price = document.getElementById('updatePrice').value;
            if (!id || !price) return toast('⚠️ Lengkapi!', true);
            
            showLoading();
            fetchAPI('updatePrice', { id, price: Number(price) }).then(r => {
                hideLoading();
                if (r.success) { document.getElementById('updatePrice').value = ''; toast('✅ Diupdate!'); loadProducts(); }
                else { toast('❌ Gagal!', true); }
            });
        }
        
        function deleteProduct() {
            const id = document.getElementById('deleteSelect').value;
            if (!id) return;
            if (!confirm('Nonaktifkan?')) return;
            
            showLoading();
            fetchAPI('deleteProduct', { id }).then(r => {
                hideLoading();
                if (r.success) { toast('✅ Dinonaktifkan!'); loadProducts(); populateSelects(); }
                else { toast('❌ Gagal!', true); }
            });
        }
        
        function populateSelects() {
            fetchAPI('getProducts').then(data => {
                if (!Array.isArray(data)) return;
                const opts = data.map(p => `<option value="${p.id}">${p.name} - ${formatRupiah(p.price)}</option>`).join('');
                document.getElementById('updateSelect').innerHTML = opts;
                document.getElementById('deleteSelect').innerHTML = opts;
            });
        }
        
        function switchReport() {
            document.getElementById('dailyDate').style.display = document.getElementById('reportType').value === 'daily' ? 'block' : 'none';
            document.getElementById('monthlyDate').style.display = document.getElementById('reportType').value === 'monthly' ? 'block' : 'none';
            loadReport();
        }
        
        function loadReport() {
            const type = document.getElementById('reportType').value;
            showLoading();
            
            if (type === 'daily') {
                const date = document.getElementById('rDate').value;
                if (!date) { hideLoading(); return; }
                fetchAPI('getDailyReport', null, '&date=' + date).then(r => {
                    hideLoading();
                    displayDaily(r);
                }).catch(() => { hideLoading(); });
            } else {
                const mv = document.getElementById('rMonth').value;
                if (!mv) { hideLoading(); return; }
                const [y, m] = mv.split('-');
                fetchAPI('getMonthlyReport', null, '&month=' + m + '&year=' + y).then(r => {
                    hideLoading();
                    displayMonthly(r);
                }).catch(() => { hideLoading(); });
            }
        }
        
        function displayDaily(r) {
            const c = document.getElementById('reportContent');
            if (!r || r.total === undefined) {
                c.innerHTML = '<p style="color:var(--muted);">Tidak ada data</p>';
                return;
            }
            
            const pt = r.pagi.nk + r.pagi.lauk + r.pagi.sembako;
            const mt = r.malam.nk + r.malam.lauk + r.malam.sembako;
            
            c.innerHTML = `
                <div class="report-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <h4>📅 ${r.date}</h4>
                        <button class="btn-sm" onclick="showDetail('${r.date}')">📋 Rincian</button>
                    </div>
                    
                    <h4 style="color:#fbbf24;">🌅 Pagi (${r.pagi.trx} transaksi)</h4>
                    <div class="report-row"><span>🍚 Nasi Kuning</span><span>${formatRupiah(r.pagi.nk)}</span></div>
                    <div class="report-row"><span>🍗 Lauk</span><span>${formatRupiah(r.pagi.lauk)}</span></div>
                    <div class="report-row"><span>🛒 Sembako</span><span>${formatRupiah(r.pagi.sembako)}</span></div>
                    <div class="report-total">Subtotal Pagi: ${formatRupiah(pt)}</div>
                    
                    <h4 style="color:#818cf8;margin-top:12px;">🌙 Malam (${r.malam.trx} transaksi)</h4>
                    <div class="report-row"><span>🍚 Nasi Kuning</span><span>${formatRupiah(r.malam.nk)}</span></div>
                    <div class="report-row"><span>🍗 Lauk</span><span>${formatRupiah(r.malam.lauk)}</span></div>
                    <div class="report-row"><span>🛒 Sembako</span><span>${formatRupiah(r.malam.sembako)}</span></div>
                    <div class="report-total">Subtotal Malam: ${formatRupiah(mt)}</div>
                    
                    <div class="report-total grand">💰 Total Harian: ${formatRupiah(r.total)}</div>
                </div>
            `;
        }
        
        function showDetail(date) {
            showLoading();
            fetchAPI('getDailyDetail', null, '&date=' + date).then(r => {
                hideLoading();
                const c = document.getElementById('detailContent');
                
                if (!r || !r.transactions || r.transactions.length === 0) {
                    c.innerHTML = '<p style="color:var(--muted);">Tidak ada transaksi</p>';
                } else {
                    let html = `<p style="color:var(--muted);font-size:12px;margin-bottom:12px;">📅 ${r.date} - ${r.transactions.length} transaksi</p>`;
                    
                    r.transactions.forEach(t => {
                        html += `
                            <div class="detail-item">
                                <div class="detail-header">
                                    <span>${t.id}</span>
                                    <span style="color:${t.session==='Pagi'?'#fbbf24':'#818cf8'}">${t.session==='Pagi'?'🌅':'🌙'} ${t.time}</span>
                                </div>
                                ${t.items.map(i => `
                                    <div class="detail-row">
                                        <span>${i.name} ×${i.qty}</span>
                                        <span>${formatRupiah(i.subtotal)}</span>
                                    </div>
                                `).join('')}
                                <div style="display:flex;justify-content:space-between;font-weight:700;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:12px;">
                                    <span>Total (${t.payment})</span>
                                    <span>${formatRupiah(t.total)}</span>
                                </div>
                            </div>
                        `;
                    });
                    
                    c.innerHTML = html;
                }
                
                openModal('detailModal');
            }).catch(() => { hideLoading(); });
        }
        
        function displayMonthly(r) {
            const c = document.getElementById('reportContent');
            if (!r || r.total === undefined) {
                c.innerHTML = '<p style="color:var(--muted);">Tidak ada data</p>';
                return;
            }
            
            let days = '';
            Object.keys(r.days).sort().forEach(d => {
                days += `<div class="report-row"><span>📅 Tgl ${d}</span><span>${formatRupiah(r.days[d])}</span></div>`;
            });
            
            c.innerHTML = `
                <div class="report-card">
                    <h4>📆 Bulan ${r.month}/${r.year}</h4>
                    
                    <h4 style="color:#fbbf24;">🌅 Pagi</h4>
                    <div class="report-row"><span>🍚 Nasi Kuning</span><span>${formatRupiah(r.cat.nk.pagi)}</span></div>
                    <div class="report-row"><span>🍗 Lauk</span><span>${formatRupiah(r.cat.lauk.pagi)}</span></div>
                    <div class="report-row"><span>🛒 Sembako</span><span>${formatRupiah(r.cat.sembako.pagi)}</span></div>
                    
                    <h4 style="color:#818cf8;margin-top:12px;">🌙 Malam</h4>
                    <div class="report-row"><span>🍚 Nasi Kuning</span><span>${formatRupiah(r.cat.nk.malam)}</span></div>
                    <div class="report-row"><span>🍗 Lauk</span><span>${formatRupiah(r.cat.lauk.malam)}</span></div>
                    <div class="report-row"><span>🛒 Sembako</span><span>${formatRupiah(r.cat.sembako.malam)}</span></div>
                    
                    <h4 style="margin-top:12px;">📅 Per Hari</h4>
                    ${days || '<p style="color:var(--muted);">Tidak ada data</p>'}
                    
                    <div class="report-total grand">💰 Total Bulanan: ${formatRupiah(r.total)}</div>
                </div>
            `;
        }
        
        function openModal(id) {
            document.getElementById(id).classList.add('show');
            if (id === 'productModal') populateSelects();
            if (id === 'reportModal') loadReport();
        }
        
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        
        function toast(msg, isErr = false) {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = 'toast' + (isErr ? ' err' : '');
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = '0.3s'; setTimeout(() => el.remove(), 300); }, 2000);
        }
        
        function showLoading() { document.getElementById('loading').classList.add('show'); }
        function hideLoading() { document.getElementById('loading').classList.remove('show'); }
        
        document.addEventListener('click', e => {
            if (e.target.classList.contains('modal')) e.target.classList.remove('show');
        });
    </script>
</body>
</html>
